<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד שיווק — קוד הבריאות</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg:      #0f172a;
    --surface: #1e293b;
    --border:  #334155;
    --text:    #f1f5f9;
    --muted:   #94a3b8;
    --accent:  #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px;
    width: 100%; max-width: 360px; text-align: center;
  }
  .login-box h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .login-box p  { color: var(--muted); margin-bottom: 28px; font-size: 0.85rem; }
  .login-box input {
    width: 100%; padding: 12px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 1.1rem; text-align: center; letter-spacing: 4px;
    margin-bottom: 12px; outline: none;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 1rem; cursor: pointer; font-weight: 600;
  }
  .login-box button:hover { opacity: 0.9; }
  #error-msg { color: #f87171; margin-top: 10px; font-size: 0.85rem; min-height: 20px; }

  /* ===== DASHBOARD ===== */
  #dashboard { display: none; padding: 16px; max-width: 960px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 20px; flex-wrap: wrap; gap: 8px;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .meta-bar  { color: var(--muted); font-size: 0.8rem; }

  .filter-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-row label { color: var(--muted); font-size: 0.82rem; }
  .filter-row select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    padding: 6px 10px; font-size: 0.85rem; cursor: pointer; outline: none;
  }
  .filter-row select:focus { border-color: var(--accent); }

  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-card .label { color: var(--muted); font-size: 0.75rem; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; }
  .stat-card .sub   { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

  .charts { display: flex; flex-direction: column; gap: 16px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 16px 16px;
  }
  .chart-card h3 {
    font-size: 0.9rem; font-weight: 600; color: var(--muted);
    margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .chart-wrap { position: relative; height: 260px; }

  @media (min-width: 640px) {
    .chart-wrap { height: 300px; }
    #dashboard  { padding: 24px; }
  }

  /* ===== CAMPAIGN CHART FILTERS ===== */
  .toggle-group { display: flex; gap: 4px; }
  .tog {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 4px 12px;
    font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
  }
  .tog.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tog:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  .camp-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 3px 10px;
    font-size: 0.78rem; cursor: pointer; color: var(--muted);
    transition: all 0.15s; user-select: none;
  }
  .camp-chip.on { color: var(--text); border-color: var(--accent); background: rgba(59,130,246,0.08); }
  .camp-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>קוד הבריאות</h2>
    <p>דשבורד שיווק פנימי</p>
    <input type="password" id="pin-input" placeholder="סיסמה" maxlength="30" autocomplete="current-password">
    <button onclick="checkPin()">כניסה</button>
    <div id="error-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h1>דשבורד שיווק</h1>
    <span class="meta-bar">עדכון אחרון: 28/06/2026 | מתעדכן מדי יום ב-5:00</span>
  </header>

  <div class="filter-row">
    <label>סינון לפי תאריך וובינר:</label>
    <select id="webinar-filter" onchange="applyFilter()">
      <option value="">כל הוובינרים</option>
    </select>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">נרשמים אתמול</div>
      <div class="value" id="stat-reg">—</div>
      <div class="sub" id="stat-reg-sub"></div>
    </div>
    <div class="stat-card">
      <div class="label">ספנד אתמול</div>
      <div class="value" id="stat-spend">—</div>
      <div class="sub">Meta + TikTok</div>
    </div>
    <div class="stat-card">
      <div class="label">עלות לנרשם (CPL)</div>
      <div class="value" id="stat-cpl">—</div>
      <div class="sub" id="stat-cpl-sub"></div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>נרשמים יומיים לפי מקור — 14 ימים</h3>
      <div class="chart-wrap"><canvas id="regChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>ספנד יומי (₪) — 14 ימים</h3>
      <div class="chart-wrap"><canvas id="spendChart"></canvas></div>
    </div>

    <div class="chart-card">
      <h3>קמפיינים — נרשמים + CPA</h3>
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:10px">
        <span style="color:var(--muted);font-size:0.82rem">פלטפורמה:</span>
        <div class="toggle-group">
          <button class="tog active" data-val="all"    onclick="setPlatform(this)">הכל</button>
          <button class="tog"        data-val="meta"   onclick="setPlatform(this)">Meta</button>
          <button class="tog"        data-val="tiktok" onclick="setPlatform(this)">TikTok</button>
        </div>
      </div>
      <div id="camp-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
      <div class="chart-wrap" style="height:320px"><canvas id="campChart"></canvas></div>
    </div>
  </div>
</div>

const PLATFORM_COLORS = {
  "facebook":  "#1877F2",
  "instagram": "#8b5cf6",
  "ig":        "#8b5cf6",
  "tiktok":    "#ef4444",
  "whatsapp":  "#25D366",
  "google":    "#4285F4",
  "organic":   "#10B981",
  "other":     "#9CA3AF",
};
const EXTRA_COLORS = ["#f59e0b","#ec4899","#8b5cf6","#ef4444","#06b6d4","#84cc16","#f97316"];
let extraIdx = 0;
const colorMap = {};
function getColor(p) {
  if (PLATFORM_COLORS[p]) return PLATFORM_COLORS[p];
  if (!colorMap[p]) { colorMap[p] = EXTRA_COLORS[extraIdx++ % EXTRA_COLORS.length]; }
  return colorMap[p];
}

// ===== AUTH =====
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function checkPin() {
  const pin = document.getElementById("pin-input").value;
  if (await sha256(pin) === PIN_HASH) {
    sessionStorage.setItem("mkt_auth","1");
    showDashboard();
  } else {
    document.getElementById("error-msg").textContent = "סיסמה שגויה";
  }
}
document.getElementById("pin-input").addEventListener("keypress", e => {
  if (e.key === "Enter") checkPin();
});

function initFilter() {
  const sel = document.getElementById("webinar-filter");
  (RAW_DATA.webinar_dates || []).forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d.slice(8,10)+"/"+d.slice(5,7)+"/"+d.slice(0,4);
    sel.appendChild(opt);
  });
}

function applyFilter() {
  const wFilter = document.getElementById("webinar-filter").value;
  const rows    = RAW_DATA.raw_rows || [];
  const filtered = wFilter ? rows.filter(r => r.w === wFilter) : rows;

  // ציר X קבוע: 14 ימים מ-payload
  const chartDates  = RAW_DATA.chart_dates || RAW_DATA.labels;
  const chartLabels = chartDates.map ? chartDates : RAW_DATA.labels;

  // labels עבור נרשמים (DD/MM)
  const regLabels = Array.isArray(chartDates)
    ? chartDates.map(d => d.slice(8,10)+"/"+d.slice(5,7))
    : RAW_DATA.labels;

  // אגרגציה נרשמים לפי date + platform
  const regByDate = {};
  filtered.forEach(r => {
    if (!regByDate[r.d]) regByDate[r.d] = {};
    regByDate[r.d][r.p] = (regByDate[r.d][r.p]||0) + r.cnt;
  });

  const platforms = [...new Set(filtered.map(r => r.p))].sort();

  const regDatasets = platforms.map(p => ({
    label:           p.charAt(0).toUpperCase()+p.slice(1),
    data:            (Array.isArray(chartDates) ? chartDates : RAW_DATA.chart_dates || []).map(
                       d => (regByDate[d]||{})[p]||0),
    backgroundColor: getColor(p),
    stack:           "reg",
    datalabels:      { display: false },
  }));

  // סה"כ יומי להצגה בראש כל בר
  const regTotals = (Array.isArray(chartDates) ? chartDates : []).map(d =>
    Object.values(regByDate[d] || {}).reduce((s, v) => s + v, 0)
  );

  renderRegChart(regLabels, regDatasets, regTotals);
  renderSpendChart(RAW_DATA.labels, RAW_DATA.spend_meta, RAW_DATA.spend_tiktok, RAW_DATA.spend_total);
  updateStats(filtered, wFilter);
  buildCampaignChart();
}

  if (datasets.length > 0 && totals.length > 0) {
    datasets[datasets.length - 1].datalabels = {
      display:   (ctx) => (totals[ctx.dataIndex] || 0) > 0,
      formatter: (_, ctx) => totals[ctx.dataIndex] > 0 ? totals[ctx.dataIndex].toLocaleString() : "",

      anchor:    "end",
      align:     "end",
      font:      { size: 10, weight: "600" },
      offset:    2,
    };

    type: "bar",

    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { position:"bottom", labels:{ color:"#94a3b8", boxWidth:12, padding:12 } },

             ticks:{ color:"#94a3b8" }, grid:{ color:"#334155" },
             title:{ display:true, text:"נרשמים", color:"#64748b" } }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ===== סטטיסטיקות =====
function updateStats(filtered, wFilter) {
  // נרשמים אתמול בלבד
  const yesterday = (RAW_DATA.chart_dates || []).slice(-1)[0] || "";
  const yestRows  = filtered.filter(r => r.d === yesterday);
  const total     = yestRows.reduce((s,r) => s+r.cnt, 0);
  const newCount  = yestRows.filter(r => r.n===1).reduce((s,r) => s+r.cnt, 0);
  const oldCount  = total - newCount;

  document.getElementById("stat-reg").textContent     = total > 0 ? total.toLocaleString() : "—";
  document.getElementById("stat-reg-sub").textContent = total > 0
    ? "חדש: "+newCount+" | ותיק: "+oldCount : "";

  const spendYest = RAW_DATA.yesterday_spend || 0;
  document.getElementById("stat-spend").textContent =
    spendYest > 0 ? "₪"+spendYest.toLocaleString() : "—";
  document.getElementById("stat-spend-sub") &&
    (document.getElementById("stat-spend-sub").textContent = spendYest > 0 ? "Meta + TikTok" : "אין נתון");

  const cpl = (total > 0 && spendYest > 0) ? Math.round(spendYest/total) : 0;
  document.getElementById("stat-cpl").textContent     = cpl > 0 ? "₪"+cpl.toLocaleString() : "—";
  document.getElementById("stat-cpl-sub").textContent = cpl > 0 ? "₪"+spendYest+"÷"+total : "אין נתון ספנד";
}

// ===== CAMPAIGN CHART =====
function initCampaignFilter() {
  const rows   = RAW_DATA.raw_rows || [];
  const fbCamps = [...new Set(rows.filter(r => isMeta(r.p)).map(r => r.c))].filter(Boolean).sort();
  const tkCamps = [...new Set(rows.filter(r => isTikTok(r.p)).map(r => r.c))].filter(Boolean).sort();
  excludedCampaigns = new Set();
  const container = document.getElementById("camp-chips");
  container.innerHTML = "";
  [...fbCamps.map(c => ({c, type:"fb"})), ...tkCamps.map(c => ({c, type:"tk"}))].forEach(({c, type}) => {
    const idx   = type === "fb" ? fbCamps.indexOf(c) : tkCamps.indexOf(c);
    const color = type === "fb" ? FB_SHADES[idx % FB_SHADES.length] : TK_SHADES[idx % TK_SHADES.length];
    const chip  = document.createElement("div");
    chip.className   = "camp-chip on";
    chip.dataset.camp = c;
    chip.innerHTML   = `<span class="dot" style="background:${color}"></span>${c || "ללא שם"}`;
    chip.onclick     = () => toggleCampaign(chip, c);
    container.appendChild(chip);
  });
}

function setPlatform(btn) {
  document.querySelectorAll(".tog").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activePlatform = btn.dataset.val;
  buildCampaignChart();
}

function toggleCampaign(chip, camp) {
  if (excludedCampaigns.has(camp)) { excludedCampaigns.delete(camp); chip.classList.add("on"); }
  else                              { excludedCampaigns.add(camp);    chip.classList.remove("on"); }
  buildCampaignChart();
}

function buildCampaignChart() {
  const chartDates = RAW_DATA.chart_dates || [];
  const labels     = chartDates.map(d => d.slice(8,10)+"/"+d.slice(5,7));
  const wFilter    = document.getElementById("webinar-filter").value;

  let rows = RAW_DATA.raw_rows || [];
  if (wFilter) rows = rows.filter(r => r.w === wFilter);
  if (activePlatform === "meta")   rows = rows.filter(r => isMeta(r.p));
  if (activePlatform === "tiktok") rows = rows.filter(r => isTikTok(r.p));
  if (activePlatform === "all")    rows = rows.filter(r => isMeta(r.p) || isTikTok(r.p));
  rows = rows.filter(r => !excludedCampaigns.has(r.c));

  // מקורות לצבעים (מכל הדאטה, לא רק filtered)
  const allRows  = RAW_DATA.raw_rows || [];
  const fbCamps  = [...new Set(allRows.filter(r => isMeta(r.p)).map(r => r.c))].filter(Boolean).sort();
  const tkCamps  = [...new Set(allRows.filter(r => isTikTok(r.p)).map(r => r.c))].filter(Boolean).sort();

  // אגרגציה לפי platform+campaign
  const regByCamp = {};
  rows.forEach(r => {
    const key = r.p + "|||" + (r.c || "");
    if (!regByCamp[key]) regByCamp[key] = {};
    regByCamp[key][r.d] = (regByCamp[key][r.d] || 0) + r.cnt;
  });

  const campKeys = Object.keys(regByCamp);
  const fbKeys   = campKeys.filter(k => isMeta(k.split("|||")[0])).sort();
  const tkKeys   = campKeys.filter(k => isTikTok(k.split("|||")[0])).sort();

  const datasets = [];
  const totals   = chartDates.map(d => rows.filter(r => r.d === d).reduce((s,r) => s+r.cnt, 0));

  fbKeys.forEach((key, i) => {
    const name = key.split("|||")[1] || "Meta";
    datasets.push({
      label: name, data: chartDates.map(d => regByCamp[key][d] || 0),
      backgroundColor: FB_SHADES[i % FB_SHADES.length],
      stack: "camp", yAxisID: "y", datalabels: { display: false },
    });
  });
  tkKeys.forEach((key, i) => {
    const name = key.split("|||")[1] || "TikTok";
    datasets.push({
      label: name, data: chartDates.map(d => regByCamp[key][d] || 0),
      backgroundColor: TK_SHADES[i % TK_SHADES.length],
      stack: "camp", yAxisID: "y", datalabels: { display: false },
    });
  });

  // סה"כ על גבי הבר האחרון
  if (datasets.length > 0) {
    datasets[datasets.length - 1].datalabels = {
      display: (ctx) => (totals[ctx.dataIndex] || 0) > 0,
      formatter: (_, ctx) => totals[ctx.dataIndex] > 0 ? totals[ctx.dataIndex] : "",
      color: "#f1f5f9", anchor: "end", align: "end",
      font: { size: 10, weight: "600" }, offset: 2,
    };
  }

  // CPA lines — ספנד מ-RAW_DATA (לא תלוי בפילטר קמפיין של הרשמות)
  const spendCamps = RAW_DATA.spend_campaigns || [];
  const spendByDP  = {};
  spendCamps.forEach(r => {
    if (!spendByDP[r.d]) spendByDP[r.d] = {};
    spendByDP[r.d][r.p] = (spendByDP[r.d][r.p] || 0) + r.s;
  });
  const regByDP = {};
  rows.forEach(r => {
    if (!regByDP[r.d]) regByDP[r.d] = {};
    regByDP[r.d][r.p] = (regByDP[r.d][r.p] || 0) + r.cnt;
  });

  if (activePlatform !== "tiktok") {
    const metaCPA = chartDates.map(d => {
      const spend = spendByDP[d]?.meta || 0;
      const regs  = Object.entries(regByDP[d]||{}).filter(([p]) => isMeta(p)).reduce((s,[,v]) => s+v, 0);
      return (spend > 0 && regs > 0) ? Math.round(spend / regs) : null;
    });
    datasets.push({
      type: "line", label: "CPA Meta (₪)", data: metaCPA,
      borderColor: "#3b8df5", backgroundColor: "transparent",
      borderWidth: 2, pointRadius: 4, tension: 0.3,
      yAxisID: "y2", datalabels: { display: false },
    });
  }

  if (activePlatform !== "meta") {
    const tkCPA = chartDates.map(d => {
      const spend = spendByDP[d]?.tiktok || 0;
      const regs  = regByDP[d]?.tiktok || 0;
      return (spend > 0 && regs > 0) ? Math.round(spend / regs) : null;
    });
    datasets.push({
      type: "line", label: "CPA TikTok (₪)", data: tkCPA,
      borderColor: "#f87171", backgroundColor: "transparent",
      borderWidth: 2, pointRadius: 4, tension: 0.3,
      yAxisID: "y2", datalabels: { display: false },
    });
  }

  renderCampaignChart(labels, datasets);
}

function renderCampaignChart(labels, datasets) {
  if (campChart) campChart.destroy();
  campChart = new Chart(document.getElementById("campChart").getContext("2d"), {
    type: "bar",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "bottom", labels: { color: "#94a3b8", boxWidth: 12, padding: 10 } },
        datalabels: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (v === null || v === undefined) return null;
              return ctx.dataset.yAxisID === "y2"
                ? `${ctx.dataset.label}: ₪${v}`
                : `${ctx.dataset.label}: ${v}`;
            }
          }
        }
      },
      scales: {
        x:  { stacked: true, ticks: { color: "#94a3b8", maxRotation: 45 }, grid: { color: "#1e293b" } },
        y:  { stacked: true, beginAtZero: true, position: "right",
              ticks: { color: "#94a3b8" }, grid: { color: "#334155" },
              title: { display: true, text: "נרשמים", color: "#64748b" } },
        y2: { position: "left", beginAtZero: true,
              ticks: { color: "#94a3b8", callback: v => "₪"+v },
              grid: { display: false },
              title: { display: true, text: "CPA (₪)", color: "#64748b" } },
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ===== INIT =====
if (sessionStorage.getItem("mkt_auth") === "1") showDashboard();
</script>
