<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד שיווק — קוד הבריאות</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg:      #0f172a;
    --surface: #1e293b;
    --border:  #334155;
    --text:    #f1f5f9;
    --muted:   #94a3b8;
    --accent:  #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px;
    width: 100%; max-width: 360px; text-align: center;
  }
  .login-box h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .login-box p  { color: var(--muted); margin-bottom: 28px; font-size: 0.85rem; }
  .login-box input {
    width: 100%; padding: 12px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 1.1rem; text-align: center; letter-spacing: 4px;
    margin-bottom: 12px; outline: none;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 1rem; cursor: pointer; font-weight: 600;
  }
  .login-box button:hover { opacity: 0.9; }
  #error-msg { color: #f87171; margin-top: 10px; font-size: 0.85rem; min-height: 20px; }

  /* ===== DASHBOARD ===== */
  #dashboard { display: none; padding: 16px; max-width: 960px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 20px; flex-wrap: wrap; gap: 8px;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .meta-bar  { color: var(--muted); font-size: 0.8rem; }

  .filter-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-row label { color: var(--muted); font-size: 0.82rem; }
  .filter-row select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    padding: 6px 10px; font-size: 0.85rem; cursor: pointer; outline: none;
  }
  .filter-row select:focus { border-color: var(--accent); }

  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-card .label { color: var(--muted); font-size: 0.75rem; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; }
  .stat-card .sub   { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

  .charts { display: flex; flex-direction: column; gap: 16px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 16px 16px;
  }
  .chart-card h3 {
    font-size: 0.9rem; font-weight: 600; color: var(--muted);
    margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .chart-wrap { position: relative; height: 260px; }

  @media (min-width: 640px) {
    .chart-wrap { height: 300px; }
    #dashboard  { padding: 24px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>קוד הבריאות</h2>
    <p>דשבורד שיווק פנימי</p>
    <input type="password" id="pin-input" placeholder="סיסמה" maxlength="30" autocomplete="current-password">
    <button onclick="checkPin()">כניסה</button>
    <div id="error-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h1>דשבורד שיווק</h1>
    <span class="meta-bar">עדכון אחרון: 04/05/2026 | מתעדכן מדי יום ב-5:00</span>
  </header>

  <div class="filter-row">
    <label>סינון לפי תאריך וובינר:</label>
    <select id="webinar-filter" onchange="applyFilter()">
      <option value="">כל הוובינרים</option>
    </select>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">נרשמים אתמול</div>
      <div class="value" id="stat-reg">—</div>
      <div class="sub" id="stat-reg-sub"></div>
    </div>
    <div class="stat-card">
      <div class="label">ספנד אתמול</div>
      <div class="value" id="stat-spend">—</div>
      <div class="sub">Meta + TikTok</div>
    </div>
    <div class="stat-card">
      <div class="label">עלות לנרשם (CPL)</div>
      <div class="value" id="stat-cpl">—</div>
      <div class="sub" id="stat-cpl-sub"></div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>נרשמים יומיים לפי מקור — 14 ימים</h3>
      <div class="chart-wrap"><canvas id="regChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>ספנד יומי (₪) — 14 ימים</h3>
      <div class="chart-wrap"><canvas id="spendChart"></canvas></div>
    </div>
  </div>
</div>

// ===== COLORS =====
const PLATFORM_COLORS = {
  "facebook":  "#1877F2",
  "instagram": "#8b5cf6",
  "ig":        "#8b5cf6",
  "tiktok":    "#000000",
  "whatsapp":  "#25D366",
  "google":    "#4285F4",
  "organic":   "#10B981",
  "other":     "#9CA3AF",
};
const EXTRA_COLORS = ["#f59e0b","#ec4899","#8b5cf6","#ef4444","#06b6d4","#84cc16","#f97316"];
let extraIdx = 0;
const colorMap = {};
function getColor(p) {
  if (PLATFORM_COLORS[p]) return PLATFORM_COLORS[p];
  if (!colorMap[p]) { colorMap[p] = EXTRA_COLORS[extraIdx++ % EXTRA_COLORS.length]; }
  return colorMap[p];
}

// ===== AUTH =====
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function checkPin() {
  const pin = document.getElementById("pin-input").value;
  if (await sha256(pin) === PIN_HASH) {
    sessionStorage.setItem("mkt_auth","1");
    showDashboard();
  } else {
    document.getElementById("error-msg").textContent = "סיסמה שגויה";
  }
}
document.getElementById("pin-input").addEventListener("keypress", e => {
  if (e.key === "Enter") checkPin();
});

// ===== CHARTS =====
let regChart = null, spendChart = null;

// מבטל את ה-datalabels הגלובלי (נרשם אוטומטית)
Chart.unregister(ChartDataLabels);

function showDashboard() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("dashboard").style.display    = "block";
  initFilter();
  applyFilter();
}

function initFilter() {
  const sel = document.getElementById("webinar-filter");
  (RAW_DATA.webinar_dates || []).forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d.slice(8,10)+"/"+d.slice(5,7)+"/"+d.slice(0,4);
    sel.appendChild(opt);
  });
}

function applyFilter() {
  const wFilter = document.getElementById("webinar-filter").value;
  const rows    = RAW_DATA.raw_rows || [];
  const filtered = wFilter ? rows.filter(r => r.w === wFilter) : rows;

  // ציר X קבוע: 14 ימים מ-payload
  const chartDates  = RAW_DATA.chart_dates || RAW_DATA.labels;
  const chartLabels = chartDates.map ? chartDates : RAW_DATA.labels;

  // labels עבור נרשמים (DD/MM)
  const regLabels = Array.isArray(chartDates)
    ? chartDates.map(d => d.slice(8,10)+"/"+d.slice(5,7))
    : RAW_DATA.labels;

  // אגרגציה נרשמים לפי date + platform
  const regByDate = {};
  filtered.forEach(r => {
    if (!regByDate[r.d]) regByDate[r.d] = {};
    regByDate[r.d][r.p] = (regByDate[r.d][r.p]||0) + r.cnt;
  });

  const platforms = [...new Set(filtered.map(r => r.p))].sort();

  const regDatasets = platforms.map(p => ({
    label:           p.charAt(0).toUpperCase()+p.slice(1),
    data:            (Array.isArray(chartDates) ? chartDates : RAW_DATA.chart_dates || []).map(
                       d => (regByDate[d]||{})[p]||0),
    backgroundColor: getColor(p),
    stack:           "reg",
  }));

  // סה"כ יומי להצגה בראש כל בר
  const regTotals = (Array.isArray(chartDates) ? chartDates : []).map(d =>
    Object.values(regByDate[d] || {}).reduce((s, v) => s + v, 0)
  );

  renderRegChart(regLabels, regDatasets, regTotals);
  renderSpendChart(RAW_DATA.labels, RAW_DATA.spend_meta, RAW_DATA.spend_tiktok, RAW_DATA.spend_total);
  updateStats(filtered, wFilter);
}

// ===== גרף נרשמים — stacked + סה"כ בראש =====
function renderRegChart(labels, datasets, totals = []) {
  // מוסיף datalabels לדאטאסט האחרון בלבד (מציג סה"כ מעל הבר)
  if (datasets.length > 0 && totals.length > 0) {
    datasets[datasets.length - 1].datalabels = {
      display:   (ctx) => (totals[ctx.dataIndex] || 0) > 0,
      formatter: (_, ctx) => totals[ctx.dataIndex] > 0 ? totals[ctx.dataIndex].toLocaleString() : "",
      color:     "#f1f5f9",
      anchor:    "end",
      align:     "end",
      font:      { size: 10, weight: "600" },
      offset:    2,
    };
  }

  if (regChart) regChart.destroy();
  regChart = new Chart(document.getElementById("regChart").getContext("2d"), {
    type: "bar",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { position:"bottom", labels:{ color:"#94a3b8", boxWidth:12, padding:12 } },
      },
      scales: {
        x: { stacked:true, ticks:{ color:"#94a3b8", maxRotation:45 }, grid:{ color:"#1e293b" } },
        y: { stacked:true, beginAtZero:true,
             ticks:{ color:"#94a3b8" }, grid:{ color:"#334155" },
             title:{ display:true, text:"נרשמים", color:"#64748b" } }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ===== גרף ספנד — סך הכל מעל כל עמוד =====
function renderSpendChart(labels, meta, tiktok, total) {
  if (spendChart) spendChart.destroy();

  spendChart = new Chart(document.getElementById("spendChart").getContext("2d"), {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          type: "bar", label: "Meta",
          data: meta, backgroundColor: "#1877F2", stack: "spend",
          datalabels: { display: false }
        },
        {
          type: "bar", label: "TikTok",
          data: tiktok, backgroundColor: "#69C9D0", stack: "spend",
          // מציג את הסכום הכולל (meta+tiktok) מעל עמוד ה-tiktok
          datalabels: {
            display: (ctx) => (total[ctx.dataIndex] || 0) > 0,
            formatter: (_, ctx) => {
              const t = total[ctx.dataIndex] || 0;
              return t > 0 ? "₪" + t.toLocaleString("he-IL") : "";
            },
            color: "#f1f5f9",
            anchor: "end",
            align: "end",
            font: { size: 10, weight: "600" },
            offset: 2,
          }
        },
        {
          type: "line", label: 'סה"כ',
          data: total,
          borderColor: "#10b981", backgroundColor: "transparent",
          borderWidth: 2, pointRadius: 3, tension: 0.3,
          datalabels: { display: false }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { position:"bottom", labels:{ color:"#94a3b8", boxWidth:12, padding:12 } },
      },
      scales: {
        x: { stacked:true, ticks:{ color:"#94a3b8", maxRotation:45 }, grid:{ color:"#1e293b" } },
        y: { beginAtZero:true,
             ticks:{ color:"#94a3b8", callback: v => "₪"+v.toLocaleString() },
             grid:{ color:"#334155" } }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ===== סטטיסטיקות =====
function updateStats(filtered, wFilter) {
  const total    = filtered.reduce((s,r) => s+r.cnt, 0);
  const newCount = filtered.filter(r => r.n===1).reduce((s,r) => s+r.cnt, 0);
  const oldCount = total - newCount;

  document.getElementById("stat-reg").textContent     = total.toLocaleString();
  document.getElementById("stat-reg-sub").textContent = wFilter
    ? "חדש: "+newCount+" | ותיק: "+oldCount
    : "חדש: "+newCount+" | ותיק: "+oldCount;

  const spendYest = RAW_DATA.yesterday_spend || 0;
  document.getElementById("stat-spend").textContent = "₪"+spendYest.toLocaleString();

  const cpl = total > 0 ? Math.round(spendYest/total) : 0;
  document.getElementById("stat-cpl").textContent     = total>0 ? "₪"+cpl.toLocaleString() : "—";
  document.getElementById("stat-cpl-sub").textContent = total>0 ? spendYest+"÷"+total : "";
}

// ===== INIT =====
if (sessionStorage.getItem("mkt_auth") === "1") showDashboard();
